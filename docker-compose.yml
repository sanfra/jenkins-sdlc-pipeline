services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  jenkins:
    build: ./docker/jenkins
    depends_on:
      sonarqube:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      ARUBA_FTP_USER: ${ARUBA_FTP_USER}
      ARUBA_FTP_PASS: ${ARUBA_FTP_PASS}
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Xmx1g -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
      TZ: Europe/Rome
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace:ro
      - C:/Users/Stefano RUSSO/Documents/src/sanfra-app:/workspace-sanfra:ro
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pg_data:
  sonar_data:
  sonar_logs:
  sonar_extensions:
  jenkins_home:
