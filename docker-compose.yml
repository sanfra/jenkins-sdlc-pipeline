services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  jenkins:
    build: ./docker/jenkins
    depends_on:
      sonarqube:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
      ARUBA_FTP_USER: ${ARUBA_FTP_USER}
      ARUBA_FTP_PASS: ${ARUBA_FTP_PASS}
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -Xmx1g -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
      TZ: Europe/Rome
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
      INFLUXDB_URL: http://influxdb-jenkins:8086
      INFLUXDB_ORG: ${INFLUXDB_JENKINS_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_JENKINS_BUCKET}
      INFLUXDB_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_USER: ${JIRA_USER}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY}
    volumes:
      - jenkins_home:/var/jenkins_home
      - .:/workspace:ro
      - C:/Users/Stefano RUSSO/Documents/src/sanfra-app:/workspace-sanfra:ro
      - /var/run/docker.sock:/var/run/docker.sock

  influxdb-jenkins:
    image: influxdb:2.7
    restart: unless-stopped
    ports:
      - "8087:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_JENKINS_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_JENKINS_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      DOCKER_INFLUXDB_INIT_RETENTION: 0
    volumes:
      - influxdb_jenkins_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/health | grep -q '\"status\":\"pass\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  grafana-jenkins:
    image: grafana/grafana:13.0.1
    restart: unless-stopped
    depends_on:
      influxdb-jenkins:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_JENKINS_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_JENKINS_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_JENKINS_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_JENKINS_BUCKET}
    volumes:
      - grafana_jenkins_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pg_data:
  sonar_data:
  sonar_logs:
  sonar_extensions:
  jenkins_home:
  influxdb_jenkins_data:
  grafana_jenkins_data:
