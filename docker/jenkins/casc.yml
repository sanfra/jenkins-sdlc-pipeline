jenkins:
  markupFormatter:
    rawHtml:
      disableSyntaxHighlighting: false
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonar-token"
              description: "SonarQube analysis token"
              secret: "${SONAR_TOKEN}"
          - usernamePassword:
              scope: GLOBAL
              id: "aruba-ftp"
              description: "Aruba FTP — sanfra.net hosting"
              username: "${ARUBA_FTP_USER}"
              password: "${ARUBA_FTP_PASS}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-api-key"
              description: "Firebase API Key"
              secret: "${VITE_FIREBASE_API_KEY}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-auth-domain"
              description: "Firebase Auth Domain"
              secret: "${VITE_FIREBASE_AUTH_DOMAIN}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-project-id"
              description: "Firebase Project ID"
              secret: "${VITE_FIREBASE_PROJECT_ID}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-storage-bucket"
              description: "Firebase Storage Bucket"
              secret: "${VITE_FIREBASE_STORAGE_BUCKET}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-messaging-sender-id"
              description: "Firebase Messaging Sender ID"
              secret: "${VITE_FIREBASE_MESSAGING_SENDER_ID}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-app-id"
              description: "Firebase App ID"
              secret: "${VITE_FIREBASE_APP_ID}"
          - string:
              scope: GLOBAL
              id: "vite-firebase-measurement-id"
              description: "Firebase Measurement ID"
              secret: "${VITE_FIREBASE_MEASUREMENT_ID}"
          - string:
              scope: GLOBAL
              id: "influxdb-token"
              description: "InfluxDB 2.x API token — Jenkins monitoring"
              secret: "${INFLUXDB_ADMIN_TOKEN}"

unclassified:
  location:
    url: "http://localhost:8080/"
  influxDbGlobalConfig:
    targets:
      - description: "jenkins-monitoring"
        url: "http://influxdb-jenkins:8086"
        credentialsId: "influxdb-token"
        organization: "${INFLUXDB_JENKINS_ORG}"
        bucket: "${INFLUXDB_JENKINS_BUCKET}"
        exposeExceptions: false
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQube"
        serverUrl: "${SONAR_HOST_URL}"
        credentialsId: "sonar-token"

jobs:
  - script: |
      pipelineJob('sanfra-app') {
        description('CI pipeline — React/Vite/Node.js — unit test, build, SonarQube')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('file:///workspace-sanfra')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: |
      pipelineJob('sdlc-pipeline') {
        description('SDLC governance pipeline — ArchUnit, SonarQube, OWASP, Checkstyle/PMD')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('file:///workspace')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
