jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonar-token"
              description: "SonarQube analysis token"
              secret: "${SONAR_TOKEN}"

unclassified:
  location:
    url: "http://localhost:8080/"
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQube"
        serverUrl: "${SONAR_HOST_URL}"
        credentialsId: "sonar-token"

jobs:
  - script: |
      pipelineJob('sanfra-app') {
        description('CI pipeline — React/Vite/Node.js — unit test, build, SonarQube')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('file:///workspace-sanfra')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: |
      pipelineJob('sdlc-pipeline') {
        description('SDLC governance pipeline — ArchUnit, SonarQube, OWASP, Checkstyle/PMD')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('file:///workspace')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
